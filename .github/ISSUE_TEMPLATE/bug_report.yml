name: Bug report
description: Report a reproducible problem in Open Edge AI.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Open Edge AI. Please include enough detail for maintainers to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the issue.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Android
        - iOS
        - Web preview
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: 'main @ abc1234'
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Paste relevant logs or attach visual evidence.
